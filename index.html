    <style>
      /* ============================================================
         تكة — Loading screen
         Concept: mimics pressing a button (the brand mark shows a
         finger pressing a red button). The red circle (button) gets
         "pressed" — scales down with a glow pulse — then releases.
         Smooth, ~1.8s cycle, GPU-only transforms.
         ============================================================ */
      .initial-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        inset: 0;
        background: #fafafa;
        z-index: 99999;
        font-family: 'Cairo', sans-serif;
        overflow: hidden;
      }

      .loader-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: tk-cardIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* ---- Brand mark ---- */
      .loader-logo {
        width: 80px;
        height: 84px;
        margin-bottom: 20px;
        overflow: visible;
      }
      .loader-logo .logo-path {
        fill: #18181b;
      }
      .logo-dot, .logo-hand, .logo-body {
        transform-box: fill-box;
        transform-origin: center;
        will-change: transform, opacity;
        backface-visibility: hidden;
      }
      .logo-hand {
        opacity: 0;
        animation: tk-hand-move 2.2s cubic-bezier(0.22, 1, 0.36, 1) infinite;
      }
      .logo-dot {
        fill: #dc2626;
        opacity: 0;
        animation: tk-press 2.2s cubic-bezier(0.22, 1, 0.36, 1) infinite;
      }
      .logo-body {
        opacity: 0;
        animation: tk-logo-reveal 2.2s cubic-bezier(0.22, 1, 0.36, 1) infinite;
      }

      /* ---- Text ---- */
      .loader-text {
        font-size: 1.6rem;
        font-weight: 800;
        color: #09090b;
        letter-spacing: -0.3px;
        margin-bottom: 2px;
        opacity: 0;
        animation: tk-fade 2.2s ease 0.4s infinite;
      }
      .loader-sub {
        font-size: 0.78rem;
        color: #71717a;
        font-weight: 600;
        opacity: 0;
        animation: tk-fade 2.2s ease 0.5s infinite;
      }

      /* ---- Keyframes ---- */
      @keyframes tk-cardIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes tk-fade {
        0%, 100% { opacity: 0; }
        20%, 88% { opacity: 1; }
      }

      /* Hand movement: starts pulled back (down-right), glides up-left to dot, clicks, releases */
      @keyframes tk-hand-move {
        0% {
          opacity: 0;
          transform: translate(28px, 28px) scale(0.92);
        }
        15% {
          opacity: 1;
          transform: translate(24px, 24px) scale(0.94);
        }
        68% {
          opacity: 1;
          transform: translate(0, 0) scale(1);
        }
        74% {
          opacity: 1;
          transform: translate(-3px, -3px) scale(0.96);
        }
        80% {
          opacity: 1;
          transform: translate(0, 0) scale(1);
        }
        88% {
          opacity: 1;
          transform: translate(0, 0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(0, 0) scale(1);
        }
      }

      /* Button press: slight shrink + glow pulse at click moment (68% to 74%) */
      @keyframes tk-press {
        0% {
          opacity: 0;
          transform: scale(0.85);
        }
        15% {
          opacity: 1;
          transform: scale(1);
        }
        0%, 67% {
          transform: scale(1);
          filter: drop-shadow(0 0 0 rgba(239, 68, 68, 0));
        }
        71% {
          transform: scale(0.82);
          filter: drop-shadow(0 0 12px rgba(239, 68, 68, 0.9));
        }
        74% {
          transform: scale(1.08);
          filter: drop-shadow(0 0 18px rgba(239, 68, 68, 0.7));
        }
        82%, 88% {
          opacity: 1;
          transform: scale(1);
          filter: drop-shadow(0 0 0 rgba(239, 68, 68, 0));
        }
        100% {
          opacity: 0;
          transform: scale(1);
        }
      }

      /* Logo reveal: fades in after click/press is completed */
      @keyframes tk-logo-reveal {
        0%, 73% {
          opacity: 0;
          transform: scale(0.96);
        }
        88% {
          opacity: 1;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .logo-hand, .logo-dot, .logo-body, .loader-card {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
          filter: none !important;
        }
      }
    </style>
